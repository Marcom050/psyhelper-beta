[pytest]
pythonpath = .
filterwarnings =
    # Third-party asyncio deprecation emitted by langchain internals on Python 3.14+.
    ignore:.*asyncio\.iscoroutinefunction.*:DeprecationWarning:langchain_core\.runnables\.utils
    # Third-party LangChain roadmap deprecation; internal code path is already covered by tests.
    ignore:.*RunnableWithMessageHistory is deprecated.*:langchain_core._api.deprecation.LangChainDeprecationWarning
