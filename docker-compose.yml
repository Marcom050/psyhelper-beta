services:
  api:
    build: .
    env_file: .env
    ports: ["8000:8000"]
    depends_on: [db]
  db:
    image: postgres:16
    environment:
      POSTGRES_DB: psyhelper
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports: ["5432:5432"]
    volumes: ["pgdata:/var/lib/postgresql/data"]
  streamlit:
    build: .
    env_file: .env
    command: streamlit run psyhelper_streamlit.py --server.port=8501 --server.address=0.0.0.0
    ports: ["8501:8501"]
    depends_on: [api]
    profiles: ["with-streamlit"]
volumes:
  pgdata:
